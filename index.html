<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartes d'introspection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script>
    (function () {
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body>
  <main class="container">
    <header class="app-header">
      <h1>Cartes d'introspection</h1>
      <p class="subtitle">Pioche une carte pour révéler une question de réflexion.</p>
    </header>
    <nav class="tab-bar" role="tablist" aria-label="Catégories de questions">
      <button class="tab-btn" data-tab="general" role="tab" aria-selected="false">Général</button>
      <button class="tab-btn" data-tab="amour"   role="tab" aria-selected="false">Amour &amp; Couple</button>
      <button class="tab-btn" data-tab="bienetre" role="tab" aria-selected="false">Bien-être mental</button>
    </nav>
    <section class="deck-section">
      <div id="deckStack" class="deck-stack"></div>
      <p id="progressText" class="progress-text">0 / 5</p>
      <button id="resetBtn" class="reset-btn" type="button">Réinitialiser le paquet</button>
    </section>
  </main>
  <button id="themeToggle" class="theme-toggle" aria-label="Basculer le thème">🌙</button>
  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
